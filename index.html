<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Investment Thinking Style</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  background:#0b0f19;
  color:#fff;
}

/* HERO整体改为纵向结构 */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:30px 18px 120px;
  gap:18px;
}

/* 👤 人设图片（最重要信任层） */
.hero-image{
  width:100%;
  max-width:520px;
  border-radius:16px;
  overflow:hidden;
  position:relative;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.hero-image img{
  width:100%;
  height:420px;
  object-fit:cover;
  filter:contrast(1.05) saturate(0.9);
}

/* 图片底部轻微渐变 */
.hero-image:after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:40%;
  background:linear-gradient(to top, rgba(11,15,25,0.9), transparent);
}

/* 文本区 */
.content{
  width:100%;
  max-width:520px;
  text-align:left;
}

.tag{
  display:inline-block;
  padding:6px 10px;
  border:1px solid #ff0033;
  color:#ff0033;
  font-size:12px;
  margin-bottom:12px;
}

h1{
  font-size:24px;
  margin:10px 0;
  line-height:1.3;
}

.subtitle{
  font-size:13px;
  opacity:0.8;
  line-height:1.6;
}

.quote{
  margin-top:14px;
  font-size:14px;
  font-weight:bold;
}

.highlight{
  color:#ff0033;
}

/* CTA */
.cta{
  margin-top:18px;
  display:block;
  background:#06c755;
  color:#fff;
  padding:14px 20px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  text-align:center;
}

/* card */
.card{
  margin-top:16px;
  background:#111827;
  padding:16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
}

.small{
  font-size:13px;
  opacity:0.75;
  line-height:1.6;
}

/* bottom CTA */
.fixed{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#0b0f19;
  padding:12px;
  border-top:1px solid rgba(255,255,255,0.1);
}

.fixed a{
  display:block;
  background:#06c755;
  padding:14px;
  border-radius:10px;
  text-decoration:none;
  color:#fff;
  font-weight:bold;
  text-align:center;
}

/* desktop优化 */
@media (min-width:768px){
  .hero{
    flex-direction:row;
    justify-content:center;
    align-items:flex-start;
    gap:40px;
    padding-top:60px;
  }

  .hero-image img{
    height:520px;
  }

  .content{
    text-align:left;
  }
}
</style>
</head>

<body>

<div class="hero">

  <!-- 👤 人设照片（最上方核心信任） -->
  <div class="hero-image">
    <img src="hero.jpg" alt="Horiemon Style">
  </div>

  <!-- 文字内容（在下方） -->
  <div class="content">

    <div class="tag">INVESTMENT × SPEED × LOGIC</div>

    <h1>
      思考を変えろ。市場はシンプルだ。
    </h1>

    <div class="subtitle">
      元ライブドア社長の思考スタイルから学ぶ<br>
      感情に依存しない株式投資戦略
    </div>

    <div class="quote">
      「努力ではなく<span class="highlight">情報の速度</span>が結果を決める」
    </div>

    <a class="cta" href="https://line.me/" target="_blank">
      LINEで無料参加
    </a>

    <div class="card">
      <div class="small">
        本プログラムは:contentReference[oaicite:1]{index=1}の<br>
        効率主義・即断即決スタイルをベースに設計されています。
      </div>
    </div>

  </div>

</div>

<div class="fixed">
  <a href="https://line.me/">今すぐLINEで無料参加</a>
</div>

</body>
</html>
